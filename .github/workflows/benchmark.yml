name: Benchmark

on:
  push:
    branches: [main, "[0-9]+.[0-9]+.x"]
  pull_request:
    branches: [main]

env:
  FORCE_COLOR: "1"

defaults:
  run:
    # Add `-l` to GitHub’s default bash options to activate mamba environments
    # https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#exit-codes-and-error-action-preference
    # https://github.com/mamba-org/setup-micromamba/#readme
    shell: bash -elo pipefail {0}

jobs:
  benchmark:
    permissions: {}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        python: ["3.12"]
        os: [ubuntu-latest]

    env:
      OS: ${{ matrix.os }}
      PYTHON: ${{ matrix.python }}
      ASV_DIR: "./benchmarks"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          # no blob filter so asv can checkout other commits

      - run: git fetch origin main:main
        if: ${{ github.ref_name != 'main' }}
        # Errors on main branch

      - uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476 # v3.0.0
        with:
          environment-name: asv
          cache-environment: true
          # Deps documented in https://asv.readthedocs.io/en/latest/installing.html
          # https://github.com/airspeed-velocity/asv/issues/1577
          # https://github.com/airspeed-velocity/asv_runner/issues/52
          create-args: >-
            python=${{ matrix.python }}
            asv>=0.6.4
            py_rattler<0.22
            conda-build
            asv_runner<0.2.2

      - name: Cache datasets
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache
          key: benchmark-state-${{ hashFiles('benchmarks/**') }}

      - name: Quick benchmark run
        working-directory: ${{ env.ASV_DIR }}
        run: |
          asv machine --yes
          asv run --dry-run --quick --show-stderr --verbose HEAD^!
